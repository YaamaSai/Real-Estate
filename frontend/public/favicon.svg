<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D06A"/>
      <stop offset="50%"  stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#A67C00"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background circle -->
  <rect width="64" height="64" rx="12" fill="#0d1b2a"/>

  <!-- Top-left wing -->
  <polyline points="12,24 26,17 32,22 18,29" stroke="url(#g)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Top-right wing -->
  <polyline points="32,22 46,17 52,24 38,31" stroke="url(#g)" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- Window dot -->
  <rect x="29.5" y="18.5" width="5" height="5" fill="url(#g)" rx="0.5"/>

  <!-- Left wall -->
  <line x1="12" y1="24" x2="12" y2="41" stroke="url(#g)" stroke-width="2"/>
  <!-- Right wall -->
  <line x1="52" y1="24" x2="52" y2="41" stroke="url(#g)" stroke-width="2"/>

  <!-- Mid band -->
  <polyline points="12,41 26,34 32,39 38,34 52,41" stroke="url(#g)" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- Center spine -->
  <line x1="32" y1="22" x2="32" y2="51" stroke="url(#g)" stroke-width="2"/>

  <!-- Bottom-left -->
  <polyline points="12,41 22,47 32,51" stroke="url(#g)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Bottom-right -->
  <polyline points="52,41 42,47 32,51" stroke="url(#g)" stroke-width="2" fill="none" stroke-linejoin="round"/>

  <!-- Base line -->
  <line x1="22" y1="47" x2="42" y2="47" stroke="url(#g)" stroke-width="2"/>
</svg>